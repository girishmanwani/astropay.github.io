<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Your Download is Ready</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="starfield"></div>

<nav class="nav">
  <span class="nav__brand">200 eBook Summaries</span>
</nav>

<main class="container" style="text-align:center; padding-top:60px;">
  <p class="eyebrow">Payment successful</p>
  <h1 style="margin-bottom:16px;">Thank you — your <em style="background:linear-gradient(180deg,#f0d896,#b6883a);-webkit-background-clip:text;background-clip:text;color:transparent;">download is ready</em></h1>
  <p class="sub" style="margin:0 auto 30px;">Your download should start automatically in a moment. If it doesn't, use the button below.</p>

  <button class="btn-buy" id="downloadBtn" style="margin-bottom:14px;">Download my eBook</button>
  <p class="secure-note" id="statusNote">Preparing your download…</p>
  <div class="error-banner" id="errorBanner"></div>
</main>

<footer>
  Trouble downloading? Email <a href="mailto:support@example.com">support@example.com</a> with your payment ID and we'll help right away.
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const downloadBtn = document.getElementById('downloadBtn');
  const statusNote = document.getElementById('statusNote');
  const errorBanner = document.getElementById('errorBanner');

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
  }

  function triggerDownload() {
    if (!token) {
      showError('No download link found. Please use the link from your payment confirmation, or contact support with your payment ID.');
      statusNote.textContent = '';
      return;
    }
    window.location.href = '/api/download?token=' + encodeURIComponent(token);
    statusNote.textContent = 'If your download did not start, click the button above.';
  }

  downloadBtn.addEventListener('click', triggerDownload);

  if (token) {
    // Auto-start the download once the page loads.
    setTimeout(triggerDownload, 800);
  } else {
    showError('No download link found. Please use the link from your payment confirmation, or contact support with your payment ID.');
    statusNote.textContent = '';
  }
</script>
</body>
</html>
